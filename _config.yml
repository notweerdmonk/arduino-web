title: Arduino Web
description: >-
  Arduino boards monitoring and management interface via gRPC, with a pub-sub
  manager daemon and a web dashboards.

theme: minima

plugins:
  - jekyll-relative-links

relative_links:
  enabled: true

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Exclude build artifacts and tooling from the generated site
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .venv/
  - Pipfile
  - Pipfile.lock
  - "*.whl"
  - "*.egg-info/"
  - .gitignore
  - noxfile.py
  - pyproject.toml
  - setup.py
