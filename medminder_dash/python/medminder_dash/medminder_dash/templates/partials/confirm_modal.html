<div id="confirm-modal" class="modal-backdrop" style="display:none;"
     _="
         on showModal
           set my.style.display to 'flex'
         end
         on hideModal
           set my.style.display to 'none'
         end
      ">
    <div class="modal-content">
        <h3 class="modal-title">{{ title }}</h3>
        <p>{{ warning }}</p>
        <form method="post" action="{{ post_url }}"
              hx-post="{{ post_url }}"
              hx-target="#medicine-result"
              hx-swap="innerHTML"
              hx-on::after-request="document.getElementById('confirm-modal').style.display='none'">
            <input type="hidden" name="confirm_token" value="{{ confirm_token }}">
            <div class="flex-row">
                <button type="submit" class="btn btn-danger">{{ confirm_label }}</button>
                <button type="button" class="btn btn-secondary"
                        onclick="document.getElementById('confirm-modal').style.display='none'">Cancel</button>
            </div>
        </form>
    </div>
</div>
