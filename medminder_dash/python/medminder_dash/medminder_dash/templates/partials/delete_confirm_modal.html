<div id="delete-confirm-modal" class="modal-backdrop modal-hidden">
    <div class="modal-content">
        <h3 class="modal-title">Delete Sketch</h3>
        <p>Are you sure you want to delete this sketch version?</p>
        <p class="text-danger-strong">This action cannot be undone.</p>
        <div class="flex-row">
            <button type="button"
                    class="btn btn-danger"
                    id="delete-confirm-btn"
                    hx-delete="/sketch"
                    hx-vals='js:{path: document.getElementById("delete-confirm-modal").__deletePath, hardware_id: (document.getElementById("active-board-hardware-id")?.value || "")}'
                    hx-target="#sketch-path-container"
                    hx-swap="outerHTML"
                    hx-on::after-request="hideModal('delete-confirm-modal')">Delete</button>
            <button type="button"
                    class="btn btn-secondary"
                    data-action="modal:hide"
                    data-target="delete-confirm-modal">Cancel</button>
        </div>
    </div>
</div>
